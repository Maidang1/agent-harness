name: Package Desktop App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag to create or update, for example v0.1.0'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            signing_identity: '-'
          - name: macOS Intel
            os: macos-latest
            rust_targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
            signing_identity: '-'
          - name: Windows x64
            os: windows-latest
            rust_targets: ''
            args: --bundles nsis
            signing_identity: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Rust stable
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Run tests
        run: corepack pnpm test

      - name: Run lint
        run: corepack pnpm lint

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.signing_identity }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: JIAJIA ${{ env.RELEASE_TAG }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          prerelease: false
          retryAttempts: 3
          assetNamePattern: book-agent-${{ env.RELEASE_TAG }}-[platform]-[arch][setup][ext]
          includeUpdaterJson: true
